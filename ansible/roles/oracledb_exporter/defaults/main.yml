oracle_instantclient_version: "21.11.0.0.0-1"
oracle_instantclient_dir: "2111000"
oracle_instantclient_url: "https://download.oracle.com/otn_software/linux/instantclient/{{ oracle_instantclient_dir }}/oracle-instantclient-basic-{{ oracle_instantclient_version }}.el8.x86_64.rpm"
oracle_instantclient_permanent_url: "https://download.oracle.com/otn_software/linux/instantclient/oracle-instantclient-basic-linuxx64.rpm"

oracle_exporter_version: "1.6.0"
oracle_exporter_binary: "oracledb_exporter-{{ oracle_exporter_version }}.linux-amd64.tar.gz"
oracle_exporter_url: "https://github.com/oracle/oracle-db-appdev-monitoring/releases/download/{{ oracle_exporter_version }}/{{ oracle_exporter_binary }}"

exporter_port: 9161
exporter_user: oracledb_exporter
exporter_group: oracledb_exporter

exporter_home: /opt/oracledb_exporter
exporter_bin_dir: /usr/local/bin
exporter_config_dir: /etc/oracledb_exporter
exporter_log_dir: /var/log/oracledb_exporter
exporter_pid_dir: /var/run
exporter_listen: 0.0.0.0

oracle_exporter_instances:
  - name: xe1
    db_host: localhost
    db_port: 1521
    db_service: XEPDB1
    db_user: system
    db_password: ""
    exporter_port: "{{ exporter_port }}"
    admin_password: ""

# Backward-compat aliases (first instance)
oracle_db_host: "{{ oracle_exporter_instances[0].db_host }}"
oracle_db_port: "{{ oracle_exporter_instances[0].db_port }}"
oracle_db_service: "{{ oracle_exporter_instances[0].db_service }}"
oracle_db_user: "{{ oracle_exporter_instances[0].db_user }}"
oracle_db_password: "{{ oracle_exporter_instances[0].db_password }}"
oracle_admin_password: "{{ oracle_exporter_instances[0].admin_password }}"
