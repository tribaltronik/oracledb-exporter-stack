oracle_exporter_version: "1.6.0"
oracle_exporter_binary: "oracledb_exporter-{{ oracle_exporter_version }}.linux-amd64.tar.gz"
oracle_exporter_url: "https://github.com/oracle/oracle-db-appdev-monitoring/releases/download/{{ oracle_exporter_version }}/{{ oracle_exporter_binary }}"

exporter_port: 9161
exporter_listen_address: "0.0.0.0:{{ exporter_port }}"
exporter_user: oracledb_exporter
exporter_group: oracledb_exporter

exporter_home: /opt/oracledb_exporter
exporter_bin_dir: /usr/local/bin
exporter_config_dir: /etc/oracledb_exporter
exporter_log_dir: /var/log/oracledb_exporter
exporter_pid_file: /var/run/oracledb_exporter.pid

oracle_db_host: localhost
oracle_db_port: 1521
oracle_db_service: XEPDB1
oracle_db_user: system
oracle_db_password: ""
